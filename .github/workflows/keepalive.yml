# Pings the Render backend so the free instance doesn't spin down (15-min idle).
# After deploy: edit BACKEND_URL below to your Render URL, commit, and push.
name: keep-backend-warm

on:
  schedule:
    - cron: "*/10 * * * *"   # every ~10 minutes (GitHub may delay under load)
  workflow_dispatch: {}       # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          BACKEND_URL: "https://vatsal-portfolio-api.onrender.com"
        run: |
          echo "Pinging $BACKEND_URL/health"
          curl -fsS --max-time 60 "$BACKEND_URL/health" || echo "ping failed (backend may be waking)"
